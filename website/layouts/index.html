{{ define "main" }}
<meta http-equiv="refresh" content="0; url={{ "research/" | relURL }}">
<link rel="canonical" href="{{ "research/" | absURL }}">
<script>
  window.location.replace({{ "research/" | relURL | jsonify }});
</script>
<section style="padding:4rem 1.5rem;max-width:52rem;margin:0 auto;font-family:'IBM Plex Sans',system-ui,sans-serif;">
  <h1 style="margin-bottom:1rem;">Redirecting to Research</h1>
  <p>If you are not redirected automatically, <a href="{{ "research/" | relURL }}">open the research archive</a>.</p>
</section>
{{ end }}
