<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#0b1020"/><text x="40" y="52" fill="#eaf0ff" font-size="30" font-family="Arial" font-weight="700">TanStack npm Supply-Chain Attack (May 2026)</text><text x="40" y="82" fill="#b8c4ee" font-size="16" font-family="Arial">Trust-boundary crossing from untrusted PR to trusted publish runtime</text><g fill="#121a33" stroke="#2d3d73" stroke-width="2"><rect x="40" y="130" width="250" height="130" rx="12"/><rect x="330" y="130" width="250" height="130" rx="12"/><rect x="620" y="130" width="250" height="130" rx="12"/><rect x="910" y="130" width="250" height="130" rx="12"/><rect x="185" y="330" width="360" height="150" rx="12"/><rect x="585" y="330" width="575" height="150" rx="12"/><rect x="40" y="530" width="1120" height="180" rx="12"/></g><g fill="#dce5ff" font-size="15" font-family="Arial"><text x="58" y="165">1) PR Entry</text><text x="58" y="190">`pull_request_target` abuse</text><text x="58" y="215">Untrusted code reaches</text><text x="58" y="237">base-repo context.</text><text x="348" y="165">2) Cache Poisoning</text><text x="348" y="190">Attacker code writes</text><text x="348" y="215">poisoned pnpm cache.</text><text x="638" y="165">3) Privileged Restore</text><text x="638" y="190">Release workflow restores</text><text x="638" y="215">poisoned cache state.</text><text x="928" y="165">4) OIDC Abuse</text><text x="928" y="190">Trusted publishing identity</text><text x="928" y="215">is misused in runtime.</text><text x="205" y="365">5) Malicious Publication</text><text x="205" y="390">84 malicious versions across 42 packages</text><text x="205" y="415">`@tanstack/setup` + `router_init.js` payload</text><text x="605" y="365">6) Downstream Impact</text><text x="605" y="390">Credential theft targeting CI/cloud secrets, SSH keys</text><text x="605" y="415">Exfiltration and potential self-propagation behavior</text><text x="60" y="565">Critical Defensive Controls:</text><text x="60" y="592">• Remove `pull_request_target` where PR code executes</text><text x="60" y="617">• Forbid cache writes from untrusted PR workflows</text><text x="60" y="642">• Isolate publish jobs; default `id-token: none`</text><text x="60" y="667">• Allow `id-token: write` only in tightly scoped publish step</text></g><g stroke="#7ea1ff" stroke-width="3" fill="none"><path d="M290 195 L330 195"/><path d="M580 195 L620 195"/><path d="M870 195 L910 195"/><path d="M1035 260 L840 330"/><path d="M745 260 L420 330"/></g></svg>
