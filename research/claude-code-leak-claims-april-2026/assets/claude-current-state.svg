<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Current package state</title>
  <desc id="desc">A dashboard-style view of the current public state of the Claude Code package as of April 5, 2026.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="70" y="82" font-family="Georgia, serif" font-size="34" fill="#111827">Current public package state as of April 5, 2026</text>
  <text x="70" y="118" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">The present-tense package view is much calmer than the viral narrative.</text>

  <rect x="70" y="170" width="300" height="180" rx="24" fill="#ffffff" stroke="#d1d5db"/>
  <text x="100" y="225" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Latest tag</text>
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#2563eb">2.1.92</text>
  <text x="100" y="315" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Public latest dist-tag in npm metadata</text>

  <rect x="400" y="170" width="300" height="180" rx="24" fill="#ffffff" stroke="#d1d5db"/>
  <text x="430" y="225" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Stable tag</text>
  <text x="430" y="280" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f766e">2.1.85</text>
  <text x="430" y="315" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Separate stable channel still exists</text>

  <rect x="730" y="170" width="400" height="180" rx="24" fill="#ffffff" stroke="#d1d5db"/>
  <text x="760" y="225" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Current tarball shape</text>
  <text x="760" y="270" font-family="Arial, sans-serif" font-size="18" fill="#374151">20 packaged files</text>
  <text x="760" y="302" font-family="Arial, sans-serif" font-size="18" fill="#374151">Single bundled cli.js about 13.2 MB</text>
  <text x="760" y="334" font-family="Arial, sans-serif" font-size="18" fill="#374151">No visible standalone map file</text>

  <rect x="70" y="395" width="515" height="250" rx="24" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="105" y="445" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">What has changed</text>
  <text x="105" y="490" font-family="Arial, sans-serif" font-size="19" fill="#3730a3">The incident version is no longer downloadable from the standard tarball URL.</text>
  <text x="105" y="528" font-family="Arial, sans-serif" font-size="19" fill="#3730a3">The official README now says npm installation is deprecated.</text>
  <text x="105" y="566" font-family="Arial, sans-serif" font-size="19" fill="#3730a3">Current public artifacts look packaged for distribution, not debugging.</text>

  <rect x="615" y="395" width="515" height="250" rx="24" fill="#fef2f2" stroke="#fecaca"/>
  <text x="650" y="445" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">What still cannot be claimed safely</text>
  <text x="650" y="490" font-family="Arial, sans-serif" font-size="19" fill="#991b1b">That all Anthropic internal code was exposed.</text>
  <text x="650" y="528" font-family="Arial, sans-serif" font-size="19" fill="#991b1b">That the same exposure remains live today.</text>
  <text x="650" y="566" font-family="Arial, sans-serif" font-size="19" fill="#991b1b">That public system prompts are evidence of the package leak.</text>
</svg>
